name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4
        
      - name: JDK 21 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Capacitor ile APK Derleme
        run: |
          # 1. Web dosyalarini izole bir 'www' klasorune tasiyoruz
          mkdir -p www
          mv index.html www/
          
          # 2. Capacitor Kurulumu
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Akilli Rota" "com.emre.akillirota" --web-dir www
          npx cap add android
          npx cap copy
          
          # 3. Kotlin Çakışma Yaması (Eski kütüphaneleri dışla)
          cat <<EOF >> android/app/build.gradle
          
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          EOF
          
          # 4. APK Derleme
          cd android && ./gradlew assembleDebug
          
      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: akilli-rota-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
