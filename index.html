<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akıllı Rota YKS</title>
    <style>
        /* --- GENEL MOBİL UYGULAMA STİLLERİ --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #333; display: flex; justify-content: center; }
        
        /* Telefon ekranı simülasyonu / kapsayıcı */
        .app-container { width: 100%; max-width: 480px; height: 100vh; background: #f4f6f9; position: relative; overflow-y: auto; overflow-x: hidden; padding-bottom: 70px; display: flex; flex-direction: column; }

        /* --- KURULUM EKRANI (SADECE İLK AÇILIŞTA) --- */
        #setupScreen { padding: 30px 20px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; background: white; z-index: 100; position: absolute; top: 0; left: 0; width: 100%; }
        #setupScreen h2 { margin-bottom: 20px; color: #1e293b; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-weight: bold; font-size: 14px; color: #64748b; display: block; margin-bottom: 8px; }
        .input-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; background: #f8fafc; }
        .btn-primary { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-primary:active { background: #1d4ed8; }

        /* --- ANA EKRAN (AKILLI ROTA) --- */
        #mainScreen { display: none; padding: 20px; }
        
        /* Üst Başlık */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        .profile-icon { width: 40px; height: 40px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #475569; }

        /* Uyarı / Analiz Kartı */
        .alert-card { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 12px; display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; font-size: 13px; color: #1e3a8a; }
        .alert-card b { color: #1e40af; }

        /* Bölüm Başlığı */
        .section-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; color: #0f172a; }

        /* Rota Kartları */
        .task-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .task-card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; position: relative; }
        .task-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .task-number { background: #3b82f6; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
        .task-title { font-size: 14px; font-weight: 700; color: #334155; }
        
        .task-tags { display: flex; gap: 8px; margin-left: 34px; flex-wrap: wrap; }
        .tag { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 4px 10px; font-size: 11px; color: #475569; display: flex; align-items: center; gap: 4px; font-weight: 600; }
        .tag.red-icon::before { content: "🎯"; font-size: 10px; }
        .tag.blue-icon::before { content: "🔹"; font-size: 10px; }

        /* Ekstra Görev Butonu */
        .btn-ekstra { background: #10b981; color: white; border: none; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold; width: 100%; margin-bottom: 25px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        /* Kaynak Durumu (İlerleme Barları) */
        .progress-card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; }
        .progress-title { font-size: 12px; font-weight: 800; color: #64748b; margin-bottom: 15px; }
        .progress-item { margin-bottom: 12px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #334155; }
        .progress-bar-bg { background: #e2e8f0; height: 8px; border-radius: 4px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background: #3b82f6; height: 100%; border-radius: 4px; }

        /* Alt Navigasyon (Bottom Nav) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #3b82f6; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="setupScreen">
        <h2>Hoş Geldin! 👋</h2>
        <p style="color: #64748b; margin-bottom: 25px; font-size: 14px;">Sana en uygun planı hazırlayabilmemiz için seviyeni belirle.</p>
        
        <div class="input-group">
            <label>Şu anki Seviyen Ne?</label>
            <select id="secimSeviye">
                <option value="temel">Temel (Konu Eksiğim Çok)</option>
                <option value="orta">Orta (Netler Ortalama)</option>
                <option value="ileri">İleri (Pratik ve Deneme Lazım)</option>
            </select>
        </div>
        
        <button class="btn-primary" onclick="profilOlustur()">Profilimi Kaydet ve Başla</button>
    </div>

    <div id="mainScreen">
        
        <div class="header">
            <h1>AKILLI ROTA</h1>
            <div class="profile-icon" onclick="profilSifirla()" title="Profili Sıfırla">👤</div>
        </div>

        <div class="alert-card">
            <span style="font-size: 16px;">📢</span>
            <div>
                <b>SON DENEME ANALİZİ:</b> Geometri ve Paragraf konularında eksik tespit edildi. Planın güncellendi!
            </div>
        </div>

        <div class="section-title">BUGÜNKÜ ROTAN</div>
        
        <div id="rotaListesi" class="task-list">
            </div>

        <button id="btnDahaCok" class="btn-ekstra" onclick="ekstraGorevVer()">
            <span>+</span> Daha Fazla Çözerim
        </button>

        <div class="progress-card">
            <div class="progress-title">KAYNAK DURUMU</div>
            
            <div class="progress-item">
                <div class="progress-label"><span>Çap Matematik SB</span> <span>%45</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: 45%;"></div></div>
            </div>
            
            <div class="progress-item">
                <div class="progress-label"><span>Limit Türkçe SB</span> <span>%70</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: 70%;"></div></div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item"><div class="nav-icon">🏠</div>Ana Sayfa</div>
        <div class="nav-item active"><div class="nav-icon">📅</div>Planım</div>
        <div class="nav-item"><div class="nav-icon">📝</div>Denemeler</div>
        <div class="nav-item" onclick="profilSifirla()"><div class="nav-icon">👤</div>Profil</div>
    </div>

</div>

<script>
    // --- VERİTABANI (Daha detaylı, görsele uygun) ---
    const kaynaklar = [
        { ders: "MATEMATİK", konu: "Trigonometri Test 3", kaynakAdi: "Çap Yayınları SB", zorluk: "Orta", seviye: ["orta", "ileri"] },
        { ders: "TÜRKÇE", konu: "Paragraf Çözümü", kaynakAdi: "Limit Kronometre", zorluk: "Kolay", seviye: ["temel", "orta"] },
        { ders: "FİZİK", konu: "Elektrik ve Manyetizma Tekrar", kaynakAdi: "MEB Kitabı", zorluk: "Zor", seviye: ["temel", "orta", "ileri"] },
        { ders: "GEOMETRİ", konu: "Üçgenler Karma Test", kaynakAdi: "Orijinal Yayınları", zorluk: "Zor", seviye: ["ileri"] },
        { ders: "KİMYA", konu: "Organik Kimya Giriş", kaynakAdi: "Aydın Yayınları", zorluk: "Orta", seviye: ["orta", "ileri"] }
    ];

    let mevcutPlan = [];

    // --- BAŞLANGIÇ KONTROLÜ (Cihaz Hafızası) ---
    window.onload = function() {
        // Cihazda profil var mı kontrol et (LocalStorage)
        const kayitliSeviye = localStorage.getItem('yks_seviye');
        
        if (kayitliSeviye) {
            // Profil varsa direkt ana ekrana geç ve plan üret
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            planHazirla(kayitliSeviye);
        } else {
            // Profil yoksa kurulum ekranını göster
            document.getElementById('setupScreen').style.display = 'flex';
            document.getElementById('mainScreen').style.display = 'none';
        }
    };

    // --- PROFİL KAYDETME ---
    function profilOlustur() {
        const secilen = document.getElementById('secimSeviye').value;
        localStorage.setItem('yks_seviye', secilen); // Cihaza kaydet
        
        // Ekranları değiştir
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        
        planHazirla(secilen);
    }

    // --- TEST İÇİN PROFİL SIFIRLAMA ---
    function profilSifirla() {
        if(confirm("Profili sıfırlamak ve yeniden seviye seçmek ister misin?")) {
            localStorage.removeItem('yks_seviye');
            location.reload(); // Sayfayı yenile
        }
    }

    // --- PLAN ÜRETİCİ ---
    function planHazirla(seviye) {
        mevcutPlan = [];
        document.getElementById('rotaListesi').innerHTML = ''; // Temizle
        
        // Seviyeye uygun kaynakları filtrele
        let uygunKaynaklar = kaynaklar.filter(k => k.seviye.includes(seviye));
        
        // Rastgele karıştırıp minimum 2 tane (veya 3 tane) görev ekle
        uygunKaynaklar = uygunKaynaklar.sort(() => 0.5 - Math.random());
        
        const gorevSayisi = Math.min(3, uygunKaynaklar.length); // İlk açılışta 3 görev ver

        for(let i = 0; i < gorevSayisi; i++) {
            mevcutPlan.push(uygunKaynaklar[i]);
            kartaYazdir(uygunKaynaklar[i], i + 1);
        }
    }

    // --- DAHA FAZLA ÇÖZ (AZALTMA YOK) ---
    function ekstraGorevVer() {
        const seviye = localStorage.getItem('yks_seviye');
        const uygunKaynaklar = kaynaklar.filter(k => k.seviye.includes(seviye));
        
        // Zaten planda olmayan bir kaynak bul
        const kalanKaynaklar = uygunKaynaklar.filter(k => !mevcutPlan.includes(k));
        
        if (kalanKaynaklar.length > 0) {
            const ekstraGorev = kalanKaynaklar[0]; // İlkini al
            mevcutPlan.push(ekstraGorev);
            kartaYazdir(ekstraGorev, mevcutPlan.length);
            
            // Tıklama efekti için küçük bir animasyon (Scroll)
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        } else {
            alert("Harikasın Emre! Bugünkü tüm potansiyel görevleri aldın. Şimdi çözme vakti!");
        }
    }

    // --- HTML KART OLUŞTURUCU (GÖRSELE BİREBİR UYGUN) ---
    function kartaYazdir(gorev, index) {
        const liste = document.getElementById('rotaListesi');
        const kart = document.createElement('div');
        kart.className = 'task-card';
        
        kart.innerHTML = `
            <div class="task-header">
                <div class="task-number">${index}</div>
                <div class="task-title">${gorev.ders}: ${gorev.konu}</div>
            </div>
            <div class="task-tags">
                <div class="tag red-icon">Kaynak: ${gorev.kaynakAdi}</div>
                <div class="tag blue-icon">Zorluk: ${gorev.zorluk}</div>
            </div>
        `;
        
        liste.appendChild(kart);
    }
</script>

</body>
</html>
